<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NUR HADITH | AI Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --emerald: #10b981; --primary: #059669; }
        body { background: #f8fafc; color: #1e293b; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .font-urdu { font-family: 'Noto Nastaliq Urdu', serif; line-height: 2.5; }
        .font-arabic { font-family: 'Amiri', serif; line-height: 1.8; font-size: 1.8rem; }
        .custom-scroll { overflow-y: auto; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #10b98133; border-radius: 10px; }
        .book-card { transition: all 0.3s ease; background: white; border: 1px solid #e2e8f0; }
        .book-card:hover { transform: translateY(-5px); border-color: var(--emerald); box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.1); }
        .active-ch { background: #ecfdf5 !important; border-right: 4px solid var(--primary); }
        @media (max-width: 768px) {
            .mobile-drawer { position: fixed; bottom: 0; left: 0; right: 0; z-index: 200; background: white; height: 70vh; transform: translateY(100%); transition: 0.4s; border-radius: 20px 20px 0 0; box-shadow: 0 -10px 25px rgba(0,0,0,0.1); }
            .drawer-open { transform: translateY(0); }
        }
    </style>
</head>
<body class="antialiased">

    <nav class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-[100]">
        <div class="flex items-center gap-3">
            <div class="bg-emerald-500 text-white p-2 rounded-lg"><i class="fa-solid fa-book-halakhah"></i></div>
            <h1 class="text-xl font-bold">NUR<span class="text-emerald-500">AI</span></h1>
        </div>
        <button onclick="goHome()" id="homeBtn" class="hidden px-4 py-2 bg-slate-800 text-white rounded-lg text-sm">ہوم</button>
    </nav>

    <main class="flex-1 relative overflow-hidden">
        <section id="view-books" class="absolute inset-0 overflow-y-auto p-6">
            <div class="max-w-6xl mx-auto text-center">
                <h2 class="font-urdu text-4xl mb-10">حدیث انسائیکلوپیڈیا</h2>
                <div id="grid-books" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                    <div class="col-span-full py-20 text-emerald-500"><i class="fa-solid fa-spinner fa-spin text-3xl"></i></div>
                </div>
            </div>
        </section>

        <section id="view-reader" class="hidden h-full flex flex-col md:flex-row p-4 gap-4 overflow-hidden">
            <aside id="chapter-side" class="mobile-drawer md:relative md:w-72 md:block bg-white border rounded-xl overflow-hidden flex flex-col">
                <div class="p-4 bg-slate-50 border-b font-bold text-sm uppercase tracking-wider">ابواب</div>
                <div id="list-chapters" class="flex-1 custom-scroll p-2"></div>
            </aside>

            <div class="flex-1 flex flex-col overflow-hidden">
                <button onclick="toggleDrawer()" class="md:hidden w-full p-3 mb-2 bg-emerald-600 text-white rounded-lg">فہرستِ ابواب</button>
                <div id="reading-zone" class="flex-1 bg-white border rounded-xl custom-scroll p-6 shadow-sm">
                    <div id="list-hadiths" class="max-w-3xl mx-auto space-y-12">
                        <div class="text-center text-slate-400 py-20">
                            <i class="fa-solid fa-book-open text-5xl mb-4"></i>
                            <p class="font-urdu">مطالعہ شروع کرنے کے لیے باب منتخب کریں</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="overlay" onclick="toggleDrawer()" class="hidden fixed inset-0 bg-black/20 z-[150]"></div>

    <script>
        const API_KEY = "$2y$10$VNFcNBFqqU9zDN3owkrHNGOFscM9f1rrB1u3ovmqmEmeCpRLf8IW";
        // Using a more reliable "Anywhere" proxy for GitHub
        const PROXY = "https://cors-anywhere.herokuapp.com/"; 
        // Fallback proxy if first one fails
        const ALT_PROXY = "https://api.allorigins.win/raw?url=";

        let activeSlug = "";

        async function apiRequest(path) {
            const baseUrl = `https://hadithapi.com/api/${path}${path.includes('?') ? '&' : '?'}apiKey=${API_KEY}`;
            try {
                // Try AllOrigins first as it doesn't require a temporary unlock
                const response = await fetch(ALT_PROXY + encodeURIComponent(baseUrl));
                if (!response.ok) throw new Error('Proxy failed');
                return await response.json();
            } catch (err) {
                console.error("Proxy Error, check console:", err);
                return null;
            }
        }

        async function loadBooks() {
            const data = await apiRequest('books');
            const grid = document.getElementById('grid-books');
            
            if (!data || !data.books) {
                grid.innerHTML = `<div class="col-span-full p-10 bg-red-50 text-red-600 rounded-lg font-urdu">
                    سرور سے رابطہ نہیں ہو سکا - براہ کرم انٹرنیٹ یا پراکسی چیک کریں۔
                </div>`;
                return;
            }

            grid.innerHTML = '';
            data.books.forEach(book => {
                const div = document.createElement('div');
                div.className = "book-card p-6 rounded-2xl cursor-pointer text-right";
                div.onclick = () => openReader(book.bookSlug, book.bookName);
                div.innerHTML = `
                    <h3 class="font-urdu text-xl font-bold text-slate-800">${book.bookName}</h3>
                    <p class="text-xs text-slate-500 mt-2 uppercase tracking-widest">${book.hadiths_count} Ahadith</p>
                `;
                grid.appendChild(div);
            });
        }

        async function openReader(slug, name) {
            activeSlug = slug;
            document.getElementById('view-books').classList.add('hidden');
            document.getElementById('view-reader').classList.remove('hidden');
            document.getElementById('homeBtn').classList.remove('hidden');
            
            const chapBox = document.getElementById('list-chapters');
            chapBox.innerHTML = '<div class="p-10 text-center"><i class="fa-solid fa-spinner fa-spin"></i></div>';

            const data = await apiRequest(`${slug}/chapters`);
            if (!data) return;

            chapBox.innerHTML = '';
            data.chapters.forEach(ch => {
                const btn = document.createElement('div');
                btn.className = "p-3 mb-1 rounded-lg cursor-pointer text-right font-urdu text-sm hover:bg-slate-50 ch-item border border-transparent";
                btn.innerHTML = ch.chapterUrdu;
                btn.onclick = () => {
                    document.querySelectorAll('.ch-item').forEach(el => el.classList.remove('active-ch', 'border-emerald-200'));
                    btn.classList.add('active-ch', 'border-emerald-200');
                    loadHadiths(ch.chapterNumber);
                    if (window.innerWidth < 768) toggleDrawer();
                };
                chapBox.appendChild(btn);
            });
        }

        async function loadHadiths(id) {
            const list = document.getElementById('list-hadiths');
            list.innerHTML = '<div class="py-20 text-center text-emerald-500"><i class="fa-solid fa-circle-notch fa-spin text-3xl"></i></div>';

            const data = await apiRequest(`hadiths?book=${activeSlug}&chapter=${id}&paginate=50`);
            if (!data || !data.hadiths) return;

            list.innerHTML = '';
            data.hadiths.data.forEach(h => {
                const art = document.createElement('article');
                art.className = "border-b border-slate-100 pb-10";
                art.innerHTML = `
                    <div class="flex items-center gap-3 mb-6">
                        <span class="bg-emerald-100 text-emerald-700 text-[10px] font-bold px-3 py-1 rounded-full">HADITH ${h.hadithNumber}</span>
                    </div>
                    <p class="font-arabic text-right mb-6" dir="rtl">${h.hadithArabic}</p>
                    <p class="font-urdu text-slate-600 text-right" dir="rtl">${h.hadithUrdu}</p>
                `;
                list.appendChild(art);
            });
            document.getElementById('reading-zone').scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleDrawer() {
            document.getElementById('chapter-side').classList.toggle('drawer-open');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function goHome() {
            document.getElementById('view-books').classList.remove('hidden');
            document.getElementById('view-reader').classList.add('hidden');
            document.getElementById('homeBtn').classList.add('hidden');
        }

        // Initialize
        loadBooks();
    </script>
</body>
</html>
