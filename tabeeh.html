<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NUR ADKHAR | SUPREME TASBEEH HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
	 <link rel="icon" href="logo.png" type="image/png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&display=swap');
        
        :root { --p-color: #10b981; }
        body { 
            background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; 
            height: 100vh; margin: 0; overflow: hidden; color: white;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Main Animated Sphere */
        .sphere-outer {
            width: 260px; height: 260px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            position: relative; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: radial-gradient(circle at 30% 30%, var(--p-color), #000);
            box-shadow: 0 0 60px rgba(16, 185, 129, 0.2), inset -10px -10px 30px rgba(0,0,0,0.6);
            cursor: pointer; border: 6px solid rgba(255,255,255,0.05);
        }
        .sphere-outer:active { transform: scale(0.9) rotate(5deg); }

        /* Rotating Progress Ring */
        .progress-ring {
            position: absolute; width: 300px; height: 300px;
            border-radius: 50%; border: 4px solid transparent;
            border-top-color: var(--p-color);
            transition: transform 0.3s ease;
        }

        /* Side Panel Styling */
        #side-panel {
            position: fixed; left: -360px; top: 0; height: 100%; width: 320px;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100;
            overflow-y: auto;
        }
        #side-panel.open { left: 0; }

        .dhikr-list-container { max-height: 250px; overflow-y: auto; padding-right: 5px; }
        .dhikr-list-container::-webkit-scrollbar { width: 4px; }
        .dhikr-list-container::-webkit-scrollbar-thumb { background: var(--p-color); border-radius: 10px; }

        .dhikr-btn {
            background: rgba(255,255,255,0.05);
            padding: 12px; border-radius: 15px; width: 100%;
            text-align: left; margin-bottom: 8px; font-weight: 700;
            transition: 0.3s; border: 1px solid transparent; display: flex; justify-content: space-between;
        }
        .dhikr-btn.active { background: var(--p-color); border-color: white; color: white; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .floating { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body>

    <button onclick="togglePanel()" class="fixed top-8 left-8 glass w-14 h-14 rounded-2xl flex items-center justify-center text-xl hover:scale-110 transition-all z-[110]">
        <i class="fa-solid fa-kaaba text-emerald-500"></i>
    </button>

    <div id="side-panel" class="glass p-6 flex flex-col gap-6 shadow-2xl no-scrollbar">
        <h2 class="text-xl font-black mt-12 mb-2 tracking-tighter">TASBEEH HUB</h2>
        
        <div class="space-y-3">
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Create New</p>
            <div class="flex gap-2">
                <input type="text" id="custom-input" placeholder="Enter Zikr..." class="bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm flex-1 outline-none focus:border-emerald-500">
                <button onclick="addCustomDhikr()" class="bg-emerald-500 w-10 h-10 rounded-xl flex items-center justify-center"><i class="fa-solid fa-plus"></i></button>
            </div>
        </div>

        <div>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">Library</p>
            <div id="dhikr-list" class="dhikr-list-container">
                <button onclick="setDhikr('SubhanAllah', this)" class="dhikr-btn active">SubhanAllah</button>
                <button onclick="setDhikr('Alhamdulillah', this)" class="dhikr-btn">Alhamdulillah</button>
                <button onclick="setDhikr('Allahu Akbar', this)" class="dhikr-btn">Allahu Akbar</button>
                <button onclick="setDhikr('Astaghfirullah', this)" class="dhikr-btn">Astaghfirullah</button>
                <button onclick="setDhikr('Darood Sharif', this)" class="dhikr-btn">Darood Sharif</button>
                <button onclick="setDhikr('La Ilaha Illallah', this)" class="dhikr-btn">La Ilaha Illallah</button>
            </div>
        </div>

        <div>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">Goal Setting</p>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="setTarget(33)" class="glass py-2 rounded-xl text-xs font-bold hover:bg-emerald-500/20">33</button>
                <button onclick="setTarget(100)" class="glass py-2 rounded-xl text-xs font-bold hover:bg-emerald-500/20">100</button>
                <button onclick="setTarget(313)" class="glass py-2 rounded-xl text-xs font-bold hover:bg-emerald-500/20">313</button>
                <button onclick="setTarget(99999)" class="glass py-2 rounded-xl text-xs font-bold hover:bg-emerald-500/20">Free</button>
            </div>
        </div>

        <div>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">Visual Style</p>
            <div class="flex gap-3">
                <div onclick="changeColor('#10b981')" class="w-8 h-8 rounded-full bg-emerald-500 cursor-pointer"></div>
                <div onclick="changeColor('#3b82f6')" class="w-8 h-8 rounded-full bg-blue-500 cursor-pointer"></div>
                <div onclick="changeColor('#a855f7')" class="w-8 h-8 rounded-full bg-purple-500 cursor-pointer"></div>
                <div onclick="changeColor('#f43f5e')" class="w-8 h-8 rounded-full bg-rose-500 cursor-pointer"></div>
            </div>
        </div>
    </div>

    <div class="text-center mb-10 px-6">
        <h3 id="current-dhikr" class="text-3xl md:text-5xl font-black tracking-tighter mb-2 opacity-90 transition-all duration-500">SubhanAllah</h3>
        <p class="text-slate-500 font-bold tracking-[0.4em] text-[10px] uppercase">Divine Presence</p>
    </div>

    <div class="relative flex items-center justify-center mb-12">
        <div id="ring" class="progress-ring"></div>
        <div class="sphere-outer floating" onclick="countUp()">
            <div class="flex flex-col items-center">
                <span id="counter" class="text-7xl font-black">0</span>
                <span id="target-label" class="text-[10px] font-bold opacity-40 uppercase tracking-[0.2em] mt-2">Goal: 33</span>
            </div>
        </div>
    </div>

    <div class="flex gap-4">
        <button onclick="resetCounter()" class="glass px-10 py-4 rounded-3xl text-[10px] font-black tracking-widest uppercase hover:text-red-400 transition-all">
            <i class="fa-solid fa-rotate-right mr-2"></i> Reset
        </button>
    </div>

    <script>
        let count = 0;
        let target = 33;
        let pColor = '#10b981';

        function countUp() {
            count++;
            document.getElementById('counter').innerText = count;
            
            let rotation = (count / target) * 360;
            document.getElementById('ring').style.transform = `rotate(${rotation}deg)`;

            if (count >= target && target < 90000) {
                document.getElementById('counter').style.color = 'gold';
                if('vibrate' in navigator) navigator.vibrate([100, 50, 100]);
            }
        }

        function resetCounter() {
            count = 0;
            document.getElementById('counter').innerText = '0';
            document.getElementById('counter').style.color = 'white';
            document.getElementById('ring').style.transform = `rotate(0deg)`;
        }

        function togglePanel() {
            document.getElementById('side-panel').classList.toggle('open');
        }

        function setDhikr(text, btn) {
            document.getElementById('current-dhikr').innerText = text;
            document.querySelectorAll('.dhikr-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            togglePanel();
            resetCounter();
        }

        function setTarget(val) {
            target = val;
            document.getElementById('target-label').innerText = val > 9000 ? "Goal: Free" : "Goal: " + val;
            resetCounter();
        }

        function changeColor(color) {
            pColor = color;
            document.documentElement.style.setProperty('--p-color', color);
            document.querySelectorAll('.dhikr-btn.active').forEach(b => b.style.backgroundColor = color);
        }

        function addCustomDhikr() {
            const input = document.getElementById('custom-input');
            const val = input.value.trim();
            if (val !== "") {
                const list = document.getElementById('dhikr-list');
                const btn = document.createElement('button');
                btn.className = "dhikr-btn";
                btn.innerHTML = `<span>${val}</span><i class="fa-solid fa-star text-[10px] opacity-40"></i>`;
                btn.onclick = function() { setDhikr(val, this); };
                list.prepend(btn);
                input.value = "";
                setDhikr(val, btn);
            }
        }
    </script>
</body>
</html>
